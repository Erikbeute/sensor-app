version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: dev
    container_name: sensor-app-php
    working_dir: /app
    volumes:
      - .:/app
      - /app/vendor
      - ./docker-entrypoint.sh:/docker-entrypoint.sh
      - app_public:/app/public
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: postgresql://sensor_user:sensor_password@db:5432/sensor_db?serverVersion=16&charset=utf8
      DATABASE_PASSWORD: sensor_password
      DEFAULT_URI: http://localhost
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sensor-network
    entrypoint: /docker-entrypoint.sh

  db:
    image: postgres:16-alpine
    container_name: sensor-app-db
    environment:
      POSTGRES_USER: sensor_user
      POSTGRES_PASSWORD: sensor_password
      POSTGRES_DB: sensor_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sensor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensor_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: sensor-app-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - app_public:/app/public
    depends_on:
      - app
    networks:
      - sensor-network

volumes:
  app_public:
  postgres_data:

networks:
  sensor-network:
    driver: bridge
